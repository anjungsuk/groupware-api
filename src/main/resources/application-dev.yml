# ===================================================================
# 개발 서버 환경 (공용 Dev DB/Redis)
# ===================================================================
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl: PT30M
      refresh-token-ttl: P7D
  storage:
    type: local
    local:
      path: /var/app/storage
      base-url: ${STORAGE_BASE_URL:http://localhost:8080/files}

logging:
  level:
    com.company.groupware: DEBUG
