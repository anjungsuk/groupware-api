# ===================================================================
# 공통 설정 (모든 환경 공유) - 변경 가능성 낮은 정책성 설정
# ===================================================================
spring:
  application:
    name: groupware-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
        default_batch_fetch_size: 100
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful
  compression:
    enabled: true
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

app:
  security:
    jwt:
      issuer: groupware-api
  storage:
    type: local

logging:
  level:
    root: INFO
    com.company.groupware: DEBUG
