# ===================================================================
# 운영 환경 — 모든 시크릿은 환경변수/Secrets Manager 주입
# AWS(RDS, ElastiCache, S3) 연동 시 storage.type=s3 로 전환
# ===================================================================
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 2000
      leak-detection-threshold: 5000
  jpa:
    properties:
      hibernate:
        show_sql: false
        generate_statistics: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
  flyway:
    enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
  storage:
    type: ${STORAGE_TYPE:local}
    s3:
      region: ${AWS_REGION:ap-northeast-2}
      bucket: ${S3_BUCKET}
      presigned-url-expiration-seconds: 300

logging:
  level:
    root: WARN
    com.company.groupware: INFO

management:
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
