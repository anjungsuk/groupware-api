# ===================================================================
# 로컬 개발 환경 (docker-compose 기반 PostgreSQL/Redis)
# ===================================================================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/groupware
    username: groupware
    password: groupware
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    properties:
      hibernate:
        show_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET:ZGV2LWxvY2FsLWp3dC1zZWNyZXQta2V5LWJhc2U2NC1lbmNvZGVkLWF0LWxlYXN0LTI1Ni1iaXRz}
      access-token-ttl: PT30M
      refresh-token-ttl: P7D
  storage:
    type: local
    local:
      path: ./storage
      base-url: http://localhost:8080/files

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
